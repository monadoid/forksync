name: ForkSync
description: Keep a fork synced with upstream automatically.

inputs:
  trigger:
    description: Trigger source passed through to `forksync sync --trigger`.
    required: false
    default: schedule
  config-path:
    description: Path to the ForkSync config file, relative to the target repository root.
    required: false
    default: .forksync.yml
  working-directory:
    description: Working directory inside the target repository where ForkSync should run.
    required: false
    default: .
  install-opencode:
    description: Whether to install OpenCode automatically when it is missing.
    required: false
    default: "true"
  verbose:
    description: Enable verbose CLI logging.
    required: false
    default: "false"
  json-logs:
    description: Enable JSON-formatted CLI logs.
    required: false
    default: "false"
  binary-path:
    description: Optional absolute path to a prebuilt ForkSync binary.
    required: false
    default: ""
  binary-version:
    description: Release tag to download when no local binary path is provided.
    required: false
    default: latest
  allow-build-fallback:
    description: Allow building ForkSync from source if no prebuilt binary is available.
    required: false
    default: "true"
  action-repository:
    description: Repository that publishes ForkSync release binaries.
    required: false
    default: ""

runs:
  using: node20
  main: dist/action.js
